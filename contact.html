<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get in touch — contact form and details." />
  <title>Contact — Professional Website</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">ProSite</a>
      <nav aria-label="Main">
        <button class="menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
          ☰
        </button>
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="section">
      <div class="container">
        <h1>Contact</h1>
        <p>
          Use the form below or reach out directly. We’ll get back to you as soon as we can.
        </p>
        <form class="contact-form mt-lg" id="contact-form" novalidate>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send message</button>
          <p id="form-status" class="mt-lg" role="status" aria-live="polite" style="display: none;"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> ProSite. Built with HTML, CSS &amp; JS.</p>
      <p><a href="contact.html">Contact</a> · <a href="about.html">About</a></p>
    </div>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
